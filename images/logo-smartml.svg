<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 45" width="160" height="45">
  <defs>
    <style>
      .logo-text { font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; fill: #ffffff; }
      .logo-accent { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Smart Text -->
  <text x="5" y="30" class="logo-text" font-size="26" letter-spacing="1">SMART</text>
  
  <!-- ML Text -->
  <text x="85" y="30" class="logo-text" font-size="26" letter-spacing="2">ML</text>
  
  <!-- Decorative dot -->
  <circle cx="145" cy="20" r="3" class="logo-accent"/>
  <circle cx="145" cy="30" r="2.5" class="logo-accent" opacity="0.8"/>
</svg>

